<!doctype html>
<html>
  <head>
    <title>LearNux</title>
    <link rel="stylesheet" href="general.css" />
    <link rel="stylesheet" href="loginpage.css" />
    <link rel="icon" type="image/png" href="assets/logo.png" />
  </head>

  <body>
    <div class="login-container">
      <div class="leftSide">
        <p style="color: #24ea24; font-weight: bold">LearNux</p>
        <p style="font-size: 30px">
          <span style="margin-left: 10px; margin-right: 100px">Learn.</span>
          <span style="margin-right: 100px">Explore.</span>
          Master.
        </p>
      </div>

      <div class="rightSide">
        <img id="peng" src="assets/logo.png" alt="" />

        <form action="home.html" class="input-section">
          <p style="font-size: 2rem; color: #24ea24; font-weight: 500; margin-top: 20px">Welcome  !</p>
        
            <input type="text" placeholder="Enter username or E-mail" id="login-username" required />
            <input type="password" placeholder="Password" id="login-password" required />
            <button type="submit" class="login-button" id="log">Log In</button>

          <p id="askuser">
            Don't have an account? Join us and <span style="color: #24ea24"><a href="signup.html" class="links" id="toggle">Sign Up</a></span>!
          </p>
        </form>

        </div>
      </div>
    </div>
    <script src="loginpage.js"></script>
  </body>
</html>
