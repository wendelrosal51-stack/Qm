<!doctype html>
<html>
  <head>
    <title>Ubuntu Installation</title>
    <link rel="stylesheet" href="general.css" type="text/css" />
    <link rel="stylesheet" href="installpages.css" type="text/css" />
    <link rel="icon" type="image/png" href="assets/logo.png" />
  </head>

  <body>
    <div class="header">
      <a href="home.html" class="links">
        <h1 id="logo">LearNux</h1>
      </a>
      <input type="text" id="search" name="search" placeholder="Search for a tutorial" />
      <img src="assets/hamicon.webp" id="hamicon" />
    </div>

    <a href="ubuntu.html">
      <img src="assets/back.webp" alt="" id="backbutton" class="links" />
    </a>

    <p class="step">
      <span style="color: #24ea24">Step 1:</span>
      Download Ubuntu ISO
    </p>
    <hr />

    <div class="contents">
      <div class="steps">
        <p>
          <b>1.</b>
          Go to
          <span style="color: #fa7f4b">Ubuntu</span>
          website: (
          <span style="color: #fa7f4b">https://ubuntu.com/</span>
          )
        </p>
        <video src="assets/u1.mp4" width="600" autoplay loop muted></video>
      </div>

      <div class="steps">
        <p>
          <b>2.</b>
          On "
          <span style="color: #fa7f4b">Download Ubuntu</span>
          " tab, click "
          <span style="color: #fa7f4b">Download Ubuntu Desktop</span>
          "
        </p>
        <video src="assets/u2.mp4" width="600" autoplay loop muted></video>
      </div>

      <div class="steps">
        <p>
          <b>3.</b>
          Select the latest version of
          <span style="color: #fa7f4b">Ubuntu</span>
          , ensure your
          <br />
          device has enough storage, then click
          <span style="color: #24ea24">Download</span>
        </p>
        <video src="assets/u3.mp4" width="600" autoplay loop muted></video>
      </div>

      <div class="navigation">
        <a href="ubuntu-installp2.html" class="links">
          <img src="assets/gotostep2.png" alt="" class="proceed" />
        </a>
      </div>
    </div>
  </body>
</html>
